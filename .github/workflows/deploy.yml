name: Deploy Static App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Checking Docker..."
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            rm -rf static-nginx-app
            git clone https://github.com/kumarikanaka/static-nginx-app.git static-nginx-app
            cd static-nginx-app

            sudo docker rm -f static-nginx || true
            rm -rf static-nginx-app
            git clone https://github.com/kumarikanaka/static-nginx-app.git
               cd static-nginx-app
            sudo docker build -t static-nginx .
            sudo docker run -d -p 80:80 --name static-nginx static-nginx
